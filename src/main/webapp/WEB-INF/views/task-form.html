<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
<div class="container mt-5">
    <h2 class="mb-4 text-center">Thêm công việc</h2>

    <form th:action="@{/tasks/save}" th:object="${taskItem}" method="post">

        <!-- ID -->
        <div class="form-group">
            <label>ID</label>
            <input type="text" class="form-control" th:field="*{id}">
        </div>

        <!-- Title -->
        <div class="form-group">
            <label>Tiêu đề</label>
            <input type="text" class="form-control" th:field="*{title}">
            <small class="text-danger"
                   th:if="${#fields.hasErrors('title')}"
                   th:errors="*{title}"></small>
        </div>

        <!-- Deadline -->
        <div class="form-group">
            <label>Deadline</label>
            <input type="date" class="form-control" th:field="*{deadline}">
            <small class="text-danger"
                   th:if="${#fields.hasErrors('deadline')}"
                   th:errors="*{deadline}"></small>
        </div>

        <!-- Priority -->
        <div class="form-group">
            <label>Priority</label>
            <select class="form-control" th:field="*{priority}">
                <option value="">-- Chọn --</option>
                <option value="HIGH">HIGH</option>
                <option value="MEDIUM">MEDIUM</option>
                <option value="LOW">LOW</option>
            </select>
            <small class="text-danger"
                   th:if="${#fields.hasErrors('priority')}"
                   th:errors="*{priority}"></small>
        </div>

        <button type="submit" class="btn btn-success">Lưu</button>
        <a href="/tasks" class="btn btn-secondary">Quay lại</a>
    </form>
</div>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
